- hosts: web_servers
  roles:
    - role-ngrok
  vars:
    ngrok_auth_token: "TON_TOKEN_ICI"  # Remplace par ton vrai token
    ngrok_region: "eu"                  # Europe (ou "us" pour USA)
    ngrok_install_service: yes          # Installe comme service
    ngrok_tunnels:
      - name: "web-site"
        proto: "http"
        address: "localhost:80"
        bind_tls: true
        inspect: false
        auth:
          username: "admin"
          password: "{{ vault_ngrok_password | default('changeme') }}"
        # Optionnel : si tu veux un sous-domaine personnalisé
        # subdomain: "monprojet-web"

- hosts: monitoring_servers
  roles:
    - role-ngrok
  vars:
    ngrok_auth_token: "TON_TOKEN_ICI"
    ngrok_region: "eu"
    ngrok_install_service: yes
    ngrok_tunnels:
      - name: "nagios-interface"
        proto: "http"
        address: "localhost:80"
        bind_tls: true
        inspect: false
        auth:
          username: "nagiosadmin"
          password: "nagios"
